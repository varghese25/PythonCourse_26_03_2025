name: Auto Commit Twice Daily

permissions:
  contents: write

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 17 * * *"
    - cron: "20 17 * * *"
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update File
        run: echo "# Updated on $(date)" >> auto_varghese.py

      - name: Commit & Push
        run: |
          git config --global user.name "varghese25"
          git config --global user.email "vbpoulose@gmail.com"
          git add auto_varghese.py
          git commit -m "Auto update $(date)" || echo "No changes"
          git push